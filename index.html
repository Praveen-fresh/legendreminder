<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Legend Reminder - Bakery Birthday Tracker</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #fff9e6 0%, #ffe8d6 100%); min-height: 100vh; }

        /* TOAST */
        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(120px); background: #2c1810; color: #fff; padding: 11px 22px; border-radius: 30px; font-size: 13px; font-weight: 700; z-index: 9999; transition: transform 0.35s cubic-bezier(.34,1.56,.64,1); white-space: nowrap; box-shadow: 0 6px 22px rgba(0,0,0,0.22); pointer-events: none; }
        .toast.show  { transform: translateX(-50%) translateY(0); }
        .toast.ok    { background: #1e7e34; }
        .toast.err   { background: #c0392b; }

        /* SYNC BAR */
        .sync-bar { padding: 7px 1rem; font-size: 12px; font-weight: 700; display: flex; align-items: center; gap: 7px; justify-content: center; border-bottom: 1px solid transparent; transition: 0.4s; }
        .sync-bar.loading { background: #fff8e1; border-color: #ffe082; color: #795548; }
        .sync-bar.synced  { background: #e8f5e9; border-color: #a5d6a7; color: #1b5e20; }
        .sync-bar.error   { background: #fce4ec; border-color: #f48fb1; color: #880e4f; }
        .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
        .sync-bar.loading .sync-dot { animation: blink 1s ease-in-out infinite; }
        @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }

        /* LOGIN */
        .login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #2c1810 0%, #8B4513 50%, #DEB887 100%); padding: 1rem; }
        .login-card { background: #fff; padding: 2rem 1.6rem; border-radius: 22px; box-shadow: 0 14px 50px rgba(0,0,0,0.28); width: 100%; max-width: 400px; }
        .login-card h1 { font-size: 26px; font-weight: 900; color: #D85A30; text-align: center; margin-bottom: 4px; }
        .login-card .sub { text-align: center; color: #aaa; font-size: 13px; margin-bottom: 1.8rem; }
        .lf { display: flex; flex-direction: column; gap: 0.85rem; }
        .lf input { padding: 13px 14px; border: 2px solid #eee; border-radius: 10px; font-size: 15px; width: 100%; transition: 0.2s; }
        .lf input:focus { outline: none; border-color: #D85A30; background: #fff9f7; }
        .lf button { padding: 13px; background: linear-gradient(135deg, #D85A30, #993C1D); color: #fff; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .lf button:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(216,90,48,.35); }
        .lf button:disabled { opacity: .6; cursor: not-allowed; transform: none !important; }
        .lerr { background: #fdecea; color: #b71c1c; padding: 10px 14px; border-radius: 8px; font-size: 13px; border-left: 3px solid #e53935; display: none; margin-bottom: .3rem; }

        /* APP */
        .app-wrap { display: none; min-height: 100vh; }
        .app-header { background: linear-gradient(135deg, #2c1810 0%, #8B4513 50%, #D2691E 100%); color: #fff; padding: 0.85rem 1rem; display: flex; justify-content: space-between; align-items: center; gap: .8rem; box-shadow: 0 4px 18px rgba(0,0,0,.18); }
        .app-header h1 { font-size: 19px; font-weight: 900; display: flex; align-items: center; gap: 7px; }
        .hright { display: flex; align-items: center; gap: 7px; }
        .sync-btn { background: rgba(255,255,255,.12); border: none; color: #fff; width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: .3s; }
        .sync-btn:hover { background: rgba(255,255,255,.24); transform: rotate(180deg); }
        .logout-btn { background: rgba(255,255,255,.13); color: #fff; border: 1.5px solid rgba(255,255,255,.45); padding: 7px 14px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 700; transition: .3s; }
        .logout-btn:hover { background: rgba(255,255,255,.22); }

        /* CONTENT */
        .content { max-width: 1200px; margin: 1rem auto; padding: 0 1rem 3rem; }
        .greeting { font-size: 15px; font-weight: 700; color: #2c1810; margin-bottom: 1rem; }

        /* CALENDAR */
        .calendar { background: #fff; padding: .9rem; border-radius: 16px; margin-bottom: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,.06); max-width: 330px; }
        .cal-title { font-size: 13px; font-weight: 800; text-align: center; margin-bottom: 8px; color: #2c1810; }
        .cal-hdr { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; text-align: center; margin-bottom: 4px; }
        .cal-lbl { font-size: 9px; font-weight: 800; color: #8B4513; text-transform: uppercase; padding: 3px; }
        .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 3px; }
        .cal-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 10px; color: #999; background: #fafafa; }
        .cal-cell.bday  { background: linear-gradient(135deg, #FFE8D6, #FFD4B3); color: #993C1D; font-weight: 800; }
        .cal-cell.today { background: #D85A30; color: #fff; font-weight: 800; border-radius: 50%; }

        /* ALERTS */
        .alerts { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
        @media(max-width:600px){ .alerts { grid-template-columns: 1fr; } }
        .alert-card { padding: 1rem; border-radius: 16px; }
        .al-today { background: linear-gradient(135deg,#FFF5E1,#FAECE7); border-left: 5px solid #D85A30; }
        .al-tmr   { background: linear-gradient(135deg,#FFFAEB,#FAEEDA); border-left: 5px solid #BA7517; }
        .alert-ttl { font-size: 13px; font-weight: 800; color: #2c1810; margin-bottom: .75rem; }
        .alert-empty { color: #ccc; font-style: italic; font-size: 13px; }
        .ev-item { background: rgba(255,255,255,.85); padding: 9px 10px; border-radius: 11px; margin-bottom: 7px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(216,90,48,.12); gap: 8px; }
        .ev-name  { font-size: 13px; font-weight: 700; color: #2c1810; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ev-phone { font-size: 11px; color: #bbb; margin-top: 1px; }
        .wa-btn { display: inline-flex; align-items: center; gap: 4px; background: #25D366; color: #fff; border: none; border-radius: 20px; padding: 6px 11px; font-size: 11px; font-weight: 700; cursor: pointer; text-decoration: none; transition: .2s; flex-shrink: 0; }
        .wa-btn:hover { background: #1da853; }

        /* ADD */
        .add-box { background: #fff; padding: 1.2rem; border-radius: 16px; margin-bottom: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
        .sec-title { font-size: 15px; font-weight: 800; color: #2c1810; margin-bottom: 1rem; }
        .fgrid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px,1fr)); gap: .8rem; margin-bottom: .8rem; }
        @media(max-width:600px){ .fgrid { grid-template-columns: 1fr; } }
        .fg { display: flex; flex-direction: column; }
        .fg label { font-size: 11px; font-weight: 800; color: #8B4513; margin-bottom: 4px; text-transform: uppercase; letter-spacing: .4px; }
        .fg input { padding: 10px 12px; border: 2px solid #eee; border-radius: 10px; font-size: 14px; transition: .2s; }
        .fg input:focus { outline: none; border-color: #D85A30; background: #fff9f7; }
        .add-btn { background: linear-gradient(135deg,#D85A30,#993C1D); color: #fff; border: none; padding: 11px 22px; border-radius: 10px; font-size: 14px; font-weight: 800; cursor: pointer; transition: .3s; align-self: flex-start; }
        .add-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(216,90,48,.3); }
        @media(max-width:600px){ .add-btn { width:100%; align-self: stretch; text-align: center; } }

        /* LIST */
        .list-box { background: #fff; padding: 1.2rem; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,.06); }
        .filter-row { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
        .fbtn { background: #f5f5f5; border: 1.5px solid #eee; padding: 7px 13px; border-radius: 20px; font-size: 12px; font-weight: 700; cursor: pointer; color: #666; transition: .2s; }
        .fbtn.active { background: #D85A30; color: #fff; border-color: #D85A30; }
        .search { width: 100%; padding: 10px 14px; border: 2px solid #eee; border-radius: 10px; font-size: 14px; margin-bottom: .7rem; transition: .2s; }
        .search:focus { outline: none; border-color: #D85A30; background: #fff9f7; }
        .rec-count { font-size: 12px; color: #ccc; margin-bottom: .5rem; }
        .tbl-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 10px; }
        .tbl { width: 100%; border-collapse: collapse; min-width: 400px; }
        .tbl thead { background: #fdf5f0; }
        .tbl th { padding: 10px 8px; text-align: left; font-size: 11px; font-weight: 800; color: #8B4513; border-bottom: 2px solid #f0e0d0; text-transform: uppercase; letter-spacing: .4px; white-space: nowrap; }
        .tbl td { padding: 11px 8px; border-bottom: 1px solid #f8f8f8; color: #333; font-size: 13px; }
        .drow { cursor: pointer; transition: .15s; }
        .drow:hover  { background: #fff5f0; }
        .drow:active { background: #feeee8; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 800; white-space: nowrap; }
        .b-today { background: #FAECE7; color: #993C1D; }
        .b-tmr   { background: #FAEEDA; color: #854F0B; }
        .b-soon  { background: #EAF3DE; color: #3B6D11; }
        .b-far   { background: #F0F0F0; color: #888; }
        .empty-msg { padding: 2.5rem; text-align: center; color: #ddd; font-size: 14px; }

        /* LOADING */
        .loading-screen { position: fixed; inset: 0; background: rgba(255,249,230,.96); z-index: 8888; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
        .spinner { width: 44px; height: 44px; border: 4px solid #f0e0d0; border-top-color: #D85A30; border-radius: 50%; animation: spin .8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-screen p { font-size: 14px; color: #8B4513; font-weight: 700; }

        /* MODAL */
        .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.52); z-index: 3000; align-items: flex-end; justify-content: center; }
        @media(min-width:600px){ .modal-bg { align-items: center; padding: 1rem; } }
        .modal-bg.open { display: flex; animation: fo .2s ease; }
        @keyframes fo { from{opacity:0} to{opacity:1} }
        .modal-box { background: #fff; border-radius: 22px 22px 0 0; padding: 1.4rem 1.4rem 2.2rem; width: 100%; max-width: 520px; max-height: 94vh; overflow-y: auto; animation: su .3s cubic-bezier(.34,1.3,.64,1); box-shadow: 0 -6px 40px rgba(0,0,0,.14); }
        @media(min-width:600px){ .modal-box { border-radius: 20px; animation: pi .25s cubic-bezier(.34,1.3,.64,1); } }
        @keyframes su { from{transform:translateY(80px);opacity:0} to{transform:translateY(0);opacity:1} }
        @keyframes pi { from{transform:scale(.95);opacity:0} to{transform:scale(1);opacity:1} }
        .mhandle { width: 38px; height: 4px; background: #e0e0e0; border-radius: 4px; margin: 0 auto 1rem; }
        @media(min-width:600px){ .mhandle { display: none; } }
        .mhead { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; }
        .mtitle { font-size: 18px; font-weight: 900; color: #2c1810; }
        .mclose { background: #f5f5f5; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; color: #999; transition: .2s; }
        .mclose:hover { background: #eee; color: #333; }

        /* VIEW FIELDS */
        .vf { margin-bottom: 1rem; }
        .vf label { font-size: 11px; font-weight: 800; color: #8B4513; display: block; margin-bottom: 3px; text-transform: uppercase; letter-spacing: .4px; }
        .vf .val { padding: 9px 14px; background: #fafafa; border-radius: 10px; font-size: 14px; color: #222; }

        /* EDIT FIELDS */
        #editMode { display: none; }
        #editMode .fg { margin-bottom: 1rem; }

        /* ACTIONS */
        .macts { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 1.4rem; }
        .macts > * { flex: 1; min-width: 100px; padding: 11px 8px; border: none; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 800; text-decoration: none; text-align: center; display: flex; align-items: center; justify-content: center; gap: 5px; transition: .22s; }
        .a-close { background: #f0f0f0; color: #666; }
        .a-close:hover { background: #e5e5e5; }
        .a-edit  { background: #e8f4fd; color: #1565C0; }
        .a-edit:hover  { background: #d0eafc; }
        .a-save  { background: linear-gradient(135deg,#D85A30,#993C1D); color: #fff; }
        .a-save:hover  { box-shadow: 0 4px 14px rgba(216,90,48,.35); }
        .a-cedit { background: #f0f0f0; color: #666; }
        .a-wa    { background: #25D366; color: #fff; }
        .a-wa:hover    { background: #1da853; }
        .a-del   { background: #fdecea; color: #c62828; }
        .a-del:hover   { background: #fbd2d0; }
        @media(max-width:400px){ .macts { flex-direction: column; } .macts > * { min-width: unset; } }

        /* MOBILE */
        @media(max-width:600px){
            .app-header h1 { font-size: 16px; }
            .app-header { padding: .7rem .9rem; }
            .content { margin: .8rem auto; padding: 0 .7rem 3rem; }
            .tbl th, .tbl td { padding: 9px 6px; font-size: 11px; }
            .badge { font-size: 9px; padding: 2px 7px; }
        }
        @media(min-width:601px) and (max-width:1024px){ .fgrid { grid-template-columns: repeat(2,1fr); } }
    </style>
</head>
<body>

<!-- LOADING -->
<div class="loading-screen" id="loadingScreen">
    <div class="spinner"></div>
    <p id="loadTxt">Loading data...</p>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- LOGIN -->
<div class="login-page" id="loginPage" style="display:none;">
    <div class="login-card">
        <h1>🎂 Legend Reminder</h1>
        <div class="sub">Bakery Birthday Tracker</div>
        <div class="lerr" id="lerr"></div>
        <form class="lf" onsubmit="doLogin(event)" autocomplete="on">
            <input type="text"     id="un" placeholder="Username" required autocomplete="username">
            <input type="password" id="pw" placeholder="Password" required autocomplete="current-password">
            <button type="submit"  id="lbtn">Login</button>
        </form>
    </div>
</div>

<!-- APP -->
<div class="app-wrap" id="appWrap">
    <div class="sync-bar loading" id="syncBar">
        <div class="sync-dot"></div>
        <span id="syncTxt">Loading...</span>
    </div>
    <div class="app-header">
        <h1>🎂 Legend Reminder</h1>
        <div class="hright">
            <button class="sync-btn" onclick="doSync()" title="Refresh data">🔄</button>
            <button class="logout-btn" onclick="doLogout()">Logout</button>
        </div>
    </div>
    <div class="content">
        <div class="greeting" id="greeting"></div>
        <div class="calendar" id="calBox"></div>
        <div class="alerts">
            <div class="alert-card al-today">
                <div class="alert-ttl">📅 Today's Birthdays</div>
                <div id="todayList"></div>
            </div>
            <div class="alert-card al-tmr">
                <div class="alert-ttl">⏰ Tomorrow's Birthdays</div>
                <div id="tmrList"></div>
            </div>
        </div>
        <div class="add-box">
            <div class="sec-title">➕ Add Birthday</div>
            <div class="fgrid">
                <div class="fg"><label>Customer Name</label><input type="text"  id="iName"  placeholder="e.g. Priya"></div>
                <div class="fg"><label>Phone (WhatsApp)</label><input type="tel"   id="iPhone" placeholder="e.g. 9876543210"></div>
                <div class="fg"><label>Birthday</label><input type="date" id="iDate"></div>
                <div class="fg" style="justify-content:flex-end;"><button class="add-btn" onclick="addEntry()">+ Add Birthday</button></div>
            </div>
        </div>
        <div class="list-box">
            <div class="sec-title">📋 All Birthdays</div>
            <div class="filter-row">
                <button class="fbtn active" onclick="setFilter('all',this)">All</button>
                <button class="fbtn" onclick="setFilter('30d',this)">Next 30 Days</button>
                <button class="fbtn" onclick="setFilter('month',this)">This Month</button>
            </div>
            <input class="search" id="searchBox" placeholder="🔍 Search by name..." oninput="renderList()">
            <div class="rec-count" id="recCount"></div>
            <div class="tbl-wrap">
                <table class="tbl">
                    <thead><tr>
                        <th>Name</th><th>Phone</th><th>Birthday</th><th>Days Left</th><th>WhatsApp</th>
                    </tr></thead>
                    <tbody id="tbody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- MODAL -->
<div class="modal-bg" id="modal" onclick="bgClick(event)">
    <div class="modal-box" id="modalBox">
        <div class="mhandle"></div>
        <div class="mhead">
            <div class="mtitle" id="mtitle">Birthday Details</div>
            <button class="mclose" onclick="closeModal()">✕</button>
        </div>
        <!-- VIEW -->
        <div id="viewMode">
            <div class="vf"><label>Name</label><div class="val" id="vName"></div></div>
            <div class="vf"><label>Phone</label><div class="val" id="vPhone"></div></div>
            <div class="vf"><label>Birthday</label><div class="val" id="vBday"></div></div>
            <div class="vf"><label>Days Until Birthday</label><div class="val" id="vDays"></div></div>
            <div class="macts">
                <button class="a-close" onclick="closeModal()">Close</button>
                <button class="a-edit"  onclick="toEdit()">✏️ Edit</button>
                <a      class="a-wa"    id="viewWA" href="#" target="_blank">WhatsApp</a>
                <button class="a-del"   onclick="delEntry()">🗑 Delete</button>
            </div>
        </div>
        <!-- EDIT -->
        <div id="editMode">
            <div class="fg"><label>Customer Name</label><input type="text"  id="eName"  placeholder="Name"></div>
            <div class="fg" style="margin:.7rem 0;"><label>Phone (WhatsApp)</label><input type="tel"   id="ePhone" placeholder="Phone"></div>
            <div class="fg"><label>Birthday</label><input type="date" id="eDate"></div>
            <div class="macts" style="margin-top:1.2rem;">
                <button class="a-cedit" onclick="toView()">Cancel</button>
                <button class="a-save"  onclick="saveEdit()">💾 Save Changes</button>
            </div>
        </div>
    </div>
</div>

<script>
/* ==============================
   CONSTANTS
   ============================== */
const VALID_USER  = '9751488503';
const VALID_PASS  = 'Neevarp5@3';
const STORAGE_KEY = 'legend_cakes_data';   // shared key across all devices

/* ==============================
   STATE
   ============================== */
let entries  = [];
let filter   = 'all';
let activeId = null;

/* ==============================
   STARTUP — load from shared storage
   ============================== */
window.addEventListener('load', async () => {
    setLoad(true, 'Loading data...');
    try {
        const res = await window.storage.get(STORAGE_KEY, true);   // shared=true
        entries = res ? JSON.parse(res.value) : [];
        setSyncBar('synced', '✓ Data synced across all devices');
    } catch(e) {
        // Key doesn't exist yet — fresh start
        entries = [];
        setSyncBar('synced', '✓ Ready — data will sync across devices');
    }
    setLoad(false);
    if (localStorage.getItem('lr_in')) { showApp(); renderUI(); }
    else showLogin();
});

/* ==============================
   SAVE to shared storage
   ============================== */
async function persist() {
    setSyncBar('loading', 'Saving...');
    try {
        await window.storage.set(STORAGE_KEY, JSON.stringify(entries), true);  // shared=true
        setSyncBar('synced', '✓ Saved — visible on all devices');
    } catch(e) {
        setSyncBar('error', '⚠ Save failed — please retry');
        showToast('Save failed!', 'err');
    }
}

/* ==============================
   SYNC — pull latest from cloud
   ============================== */
async function doSync() {
    setSyncBar('loading', 'Syncing...');
    try {
        const res = await window.storage.get(STORAGE_KEY, true);
        entries = res ? JSON.parse(res.value) : [];
        setSyncBar('synced', '✓ Up to date');
        renderUI();
        showToast('Data refreshed!', 'ok');
    } catch(e) {
        setSyncBar('error', '⚠ Sync failed');
        showToast('Sync failed', 'err');
    }
}

/* ==============================
   UI HELPERS
   ============================== */
function setLoad(show, msg) {
    document.getElementById('loadingScreen').style.display = show ? 'flex' : 'none';
    if (msg) document.getElementById('loadTxt').textContent = msg;
}
function showLogin() {
    document.getElementById('loginPage').style.display = 'flex';
    document.getElementById('appWrap').style.display   = 'none';
}
function showApp() {
    document.getElementById('loginPage').style.display = 'none';
    document.getElementById('appWrap').style.display   = 'block';
}
function setSyncBar(state, txt) {
    const b = document.getElementById('syncBar');
    b.className = 'sync-bar ' + state;
    document.getElementById('syncTxt').textContent = txt;
}
function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className   = 'toast' + (type ? ' '+type : '');
    t.classList.add('show');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), 2800);
}

/* ==============================
   AUTH
   ============================== */
function doLogin(e) {
    e.preventDefault();
    const u = document.getElementById('un').value.trim();
    const p = document.getElementById('pw').value.trim();
    const err = document.getElementById('lerr');
    const btn = document.getElementById('lbtn');

    if (u === VALID_USER && p === VALID_PASS) {
        btn.textContent = 'Logging in...';
        btn.disabled = true;
        localStorage.setItem('lr_in', '1');
        showApp();
        renderUI();
    } else {
        err.textContent = u !== VALID_USER ? 'Invalid username.' : 'Incorrect password.';
        err.style.display = 'block';
    }
}
function doLogout() {
    if (!confirm('Logout?')) return;
    localStorage.removeItem('lr_in');
    document.getElementById('un').value = '';
    document.getElementById('pw').value = '';
    document.getElementById('lbtn').textContent = 'Login';
    document.getElementById('lbtn').disabled = false;
    document.getElementById('lerr').style.display = 'none';
    showLogin();
}

/* ==============================
   HELPERS
   ============================== */
const pad = n => String(n).padStart(2,'0');
function todayMMDD() { const d=new Date(); return pad(d.getMonth()+1)+pad(d.getDate()); }
function toMMDD(s)   { const p=s.split('-'); return p[1]+p[2]; }
function mmddToInputDate(m) { return `${new Date().getFullYear()}-${m.substring(0,2)}-${m.substring(2,4)}`; }
function fmtDate(m) {
    if (!m||m.length!==4) return '—';
    const ms=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${m.substring(2)} ${ms[parseInt(m.substring(0,2))-1]}`;
}
function daysUntil(mmdd) {
    const t=new Date(); const y=t.getFullYear();
    let bd=new Date(y, parseInt(mmdd.substring(0,2))-1, parseInt(mmdd.substring(2,4)));
    const today=new Date(t.getFullYear(),t.getMonth(),t.getDate());
    if (bd<today) bd.setFullYear(y+1);
    return Math.round((bd-today)/86400000);
}
function waLink(name,phone) {
    const c=phone.replace(/\D/g,'');
    return `https://wa.me/${c}?text=${encodeURIComponent(`Happy Birthday ${name}! 🎂🎉 Wishing you a wonderful day! - Legend Cakes`)}`;
}
function badge(d) {
    if (d===0) return `<span class="badge b-today">🎉 Today!</span>`;
    if (d===1) return `<span class="badge b-tmr">⏰ Tomorrow</span>`;
    if (d<=30) return `<span class="badge b-soon">In ${d}d</span>`;
    return           `<span class="badge b-far">${d}d</span>`;
}

/* ==============================
   RENDER
   ============================== */
function renderUI() {
    const h=new Date().getHours();
    document.getElementById('greeting').textContent =
        h<12?'🌅 Good Morning!': h<17?'☀️ Good Afternoon!':'🌙 Good Evening!';
    renderAlerts(); renderCalendar(); renderList();
}

function renderAlerts() {
    const td=todayMMDD();
    const tmD=new Date(); tmD.setDate(tmD.getDate()+1);
    const tm=pad(tmD.getMonth()+1)+pad(tmD.getDate());
    ['today','tmr'].forEach(k=>{
        const mmdd=k==='today'?td:tm;
        const list=entries.filter(e=>e.mmdd===mmdd);
        document.getElementById(k==='today'?'todayList':'tmrList').innerHTML=
            !list.length ? `<div class="alert-empty">No birthdays ${k==='today'?'today':'tomorrow'} 🙂</div>` :
            list.map(e=>`<div class="ev-item">
                <div><div class="ev-name">${e.name}</div><div class="ev-phone">${e.phone||'No phone'}</div></div>
                ${e.phone?`<a href="${waLink(e.name,e.phone)}" target="_blank" class="wa-btn">🟢 Wish</a>`:''}
            </div>`).join('');
    });
}

function renderCalendar() {
    const now=new Date(); const y=now.getFullYear(); const m=now.getMonth();
    const first=new Date(y,m,1).getDay(); const days=new Date(y,m+1,0).getDate();
    const cm=pad(m+1); const td=now.getDate();
    const bdSet=new Set(entries.filter(e=>e.mmdd&&e.mmdd.substring(0,2)===cm).map(e=>parseInt(e.mmdd.substring(2,4))));
    const mN=['January','February','March','April','May','June','July','August','September','October','November','December'];
    let h=`<div class="cal-title">${mN[m]} ${y}</div>
    <div class="cal-hdr">${['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div class="cal-lbl">${d}</div>`).join('')}</div>
    <div class="cal-grid">`;
    for(let i=0;i<first;i++) h+='<div></div>';
    for(let d=1;d<=days;d++){
        let c='cal-cell'; if(d===td) c+=' today'; else if(bdSet.has(d)) c+=' bday';
        h+=`<div class="${c}">${d}</div>`;
    }
    document.getElementById('calBox').innerHTML=h+'</div>';
}

function renderList() {
    const q=(document.getElementById('searchBox').value||'').toLowerCase();
    let f=entries.filter(e=>e.name&&e.name.toLowerCase().includes(q));
    if (filter==='30d')   f=f.filter(e=>{const d=daysUntil(e.mmdd);return d>=0&&d<=30;});
    if (filter==='month') f=f.filter(e=>e.mmdd&&e.mmdd.substring(0,2)===todayMMDD().substring(0,2));
    f.sort((a,b)=>daysUntil(a.mmdd)-daysUntil(b.mmdd));
    document.getElementById('recCount').textContent=`${f.length} record${f.length!==1?'s':''}`;
    const tb=document.getElementById('tbody');
    if(!f.length){tb.innerHTML=`<tr><td colspan="5" class="empty-msg">🎂 No birthdays found</td></tr>`;return;}
    tb.innerHTML=f.map(e=>{
        const d=daysUntil(e.mmdd);
        return `<tr class="drow" onclick="openModal(${e.id})">
            <td><strong>${e.name}</strong></td>
            <td style="color:#999;">${e.phone||'—'}</td>
            <td>${fmtDate(e.mmdd)}</td>
            <td>${badge(d)}</td>
            <td>${e.phone?`<a href="${waLink(e.name,e.phone)}" target="_blank" class="wa-btn" onclick="event.stopPropagation()">Wish</a>`:'—'}</td>
        </tr>`;
    }).join('');
}

/* ==============================
   ADD
   ============================== */
async function addEntry() {
    const name =document.getElementById('iName').value.trim();
    const phone=document.getElementById('iPhone').value.trim();
    const date =document.getElementById('iDate').value;
    if (!name)  { showToast('Enter customer name','err'); return; }
    if (!date)  { showToast('Select birthday date','err'); return; }
    if (phone && entries.some(e=>e.phone===phone)) { showToast('Phone already exists!','err'); return; }
    entries.push({id:Date.now(), name, phone, mmdd:toMMDD(date)});
    entries.sort((a,b)=>daysUntil(a.mmdd)-daysUntil(b.mmdd));
    await persist();
    document.getElementById('iName').value='';
    document.getElementById('iPhone').value='';
    document.getElementById('iDate').value='';
    renderUI();
    showToast(`🎂 ${name} added!`,'ok');
}

function setFilter(f,btn) {
    filter=f;
    document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderList();
}

/* ==============================
   MODAL
   ============================== */
function openModal(id) {
    const e=entries.find(x=>x.id===id); if(!e) return;
    activeId=id;
    const d=daysUntil(e.mmdd);
    document.getElementById('vName').textContent =e.name;
    document.getElementById('vPhone').textContent=e.phone||'Not provided';
    document.getElementById('vBday').textContent =fmtDate(e.mmdd);
    document.getElementById('vDays').innerHTML   =badge(d);
    const wa=document.getElementById('viewWA');
    if(e.phone){wa.href=waLink(e.name,e.phone);wa.style.display='flex';}
    else wa.style.display='none';
    toView();
    document.getElementById('modal').classList.add('open');
    document.body.style.overflow='hidden';
}
function toView() {
    document.getElementById('mtitle').textContent='Birthday Details';
    document.getElementById('viewMode').style.display='block';
    document.getElementById('editMode').style.display='none';
}
function toEdit() {
    const e=entries.find(x=>x.id===activeId); if(!e) return;
    document.getElementById('eName').value =e.name;
    document.getElementById('ePhone').value=e.phone||'';
    document.getElementById('eDate').value =mmddToInputDate(e.mmdd);
    document.getElementById('mtitle').textContent='✏️ Edit Birthday';
    document.getElementById('viewMode').style.display='none';
    document.getElementById('editMode').style.display='block';
    document.getElementById('eName').focus();
}
async function saveEdit() {
    const name =document.getElementById('eName').value.trim();
    const phone=document.getElementById('ePhone').value.trim();
    const date =document.getElementById('eDate').value;
    if (!name) { showToast('Name cannot be empty','err'); return; }
    if (!date) { showToast('Select a date','err'); return; }
    if (phone && entries.some(e=>e.phone===phone&&e.id!==activeId)) { showToast('Phone already exists!','err'); return; }
    const idx=entries.findIndex(e=>e.id===activeId);
    if (idx!==-1) {
        entries[idx]={...entries[idx], name, phone, mmdd:toMMDD(date)};
        entries.sort((a,b)=>daysUntil(a.mmdd)-daysUntil(b.mmdd));
        await persist();
        renderUI(); closeModal();
        showToast(`✅ ${name} updated!`,'ok');
    }
}
async function delEntry() {
    const e=entries.find(x=>x.id===activeId);
    if(!e||!confirm(`Delete ${e.name}?`)) return;
    entries=entries.filter(x=>x.id!==activeId);
    await persist();
    renderUI(); closeModal();
    showToast(`🗑 ${e.name} deleted`);
}
function closeModal() {
    document.getElementById('modal').classList.remove('open');
    document.body.style.overflow=''; activeId=null;
}
function bgClick(ev) { if(ev.target===document.getElementById('modal')) closeModal(); }

/* Auto-refresh every 60 seconds to pick up changes from other devices */
setInterval(async ()=>{
    if(!localStorage.getItem('lr_in')) return;
    try {
        const res=await window.storage.get(STORAGE_KEY,true);
        const fresh=res?JSON.parse(res.value):[];
        if(JSON.stringify(fresh)!==JSON.stringify(entries)){
            entries=fresh; renderUI();
            setSyncBar('synced','✓ Auto-refreshed from cloud');
        }
    } catch(e){}
}, 60000);
</script>
