<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Legend Reminder - Bakery Birthday Tracker</title>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #fff9e6 0%, #ffe8d6 100%); min-height: 100vh; }

        /* ===== TOAST ===== */
        .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(100px); background: #2c1810; color: white; padding: 12px 24px; border-radius: 30px; font-size: 14px; font-weight: 600; z-index: 9999; transition: transform 0.35s cubic-bezier(.34,1.56,.64,1); white-space: nowrap; box-shadow: 0 6px 20px rgba(0,0,0,0.2); pointer-events: none; }
        .toast.show { transform: translateX(-50%) translateY(0); }
        .toast.success { background: #1a8c3f; }
        .toast.error { background: #c0392b; }

        /* ===== SYNC BAR ===== */
        .sync-bar { background: #fff8e1; border-bottom: 1px solid #ffe082; padding: 7px 1rem; font-size: 12px; color: #795548; display: flex; align-items: center; gap: 7px; justify-content: center; font-weight: 600; transition: 0.3s; }
        .sync-bar.synced { background: #e8f5e9; border-color: #a5d6a7; color: #2e7d32; }
        .sync-bar.offline { background: #fce4ec; border-color: #f48fb1; color: #880e4f; }
        .sync-dot { width: 8px; height: 8px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
        .sync-bar:not(.synced):not(.offline) .sync-dot { animation: pulse 1.2s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.25} }

        /* ===== LOGIN PAGE ===== */
        .login-page { display: flex; align-items: center; justify-content: center; min-height: 100vh; background: linear-gradient(135deg, #2c1810 0%, #8B4513 50%, #DEB887 100%); padding: 1rem; }
        .login-card { background: white; padding: 2rem 1.5rem; border-radius: 22px; box-shadow: 0 12px 48px rgba(0,0,0,0.25); width: 100%; max-width: 400px; }
        .login-card h1 { font-size: 26px; margin-bottom: 4px; color: #D85A30; text-align: center; font-weight: 800; }
        .login-card .sub { text-align: center; color: #aaa; margin-bottom: 1.6rem; font-size: 13px; }
        .login-form { display: flex; flex-direction: column; gap: 0.9rem; }
        .login-form input { padding: 13px 14px; border: 2px solid #eee; border-radius: 10px; font-size: 15px; width: 100%; transition: 0.2s; }
        .login-form input:focus { outline: none; border-color: #D85A30; background: #fff9f7; }
        .login-form button { padding: 13px; background: linear-gradient(135deg, #D85A30, #993C1D); color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .login-form button:hover { transform: translateY(-2px); box-shadow: 0 8px 22px rgba(216,90,48,0.35); }
        .login-form button:active { transform: scale(0.98); }
        .login-form button:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
        .login-error { background: #fdecea; color: #b71c1c; padding: 10px 14px; border-radius: 8px; margin-bottom: 0.5rem; display: none; font-size: 13px; border-left: 3px solid #e53935; }

        /* ===== APP HEADER ===== */
        .app-container { display: none; min-height: 100vh; }
        .app-header { background: linear-gradient(135deg, #2c1810 0%, #8B4513 50%, #D2691E 100%); color: white; padding: 0.85rem 1rem; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 4px 18px rgba(0,0,0,0.18); gap: 0.8rem; }
        .app-header h1 { font-size: 19px; display: flex; align-items: center; gap: 8px; font-weight: 800; }
        .header-right { display: flex; align-items: center; gap: 8px; }
        .sync-btn { background: rgba(255,255,255,0.12); border: none; color: white; width: 34px; height: 34px; border-radius: 50%; cursor: pointer; font-size: 16px; display: flex; align-items: center; justify-content: center; transition: 0.3s; }
        .sync-btn:hover { background: rgba(255,255,255,0.22); transform: rotate(180deg); }
        .logout-btn { background: rgba(255,255,255,0.14); color: white; border: 1.5px solid rgba(255,255,255,0.45); padding: 7px 14px; border-radius: 20px; cursor: pointer; font-size: 12px; font-weight: 600; transition: 0.3s; white-space: nowrap; }
        .logout-btn:hover { background: rgba(255,255,255,0.24); }
        .logout-btn:active { transform: scale(0.95); }

        /* ===== APP CONTENT ===== */
        .app-content { max-width: 1200px; margin: 1rem auto; padding: 0 1rem 2rem; }
        .greeting { font-size: 15px; font-weight: 700; color: #2c1810; margin-bottom: 1rem; }

        /* ===== CALENDAR ===== */
        .month-calendar { background: white; padding: 0.9rem; border-radius: 16px; margin-bottom: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.06); max-width: 330px; }
        .cal-title { font-size: 13px; font-weight: 700; text-align: center; margin-bottom: 8px; color: #2c1810; }
        .cal-grid-header { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; text-align: center; margin-bottom: 4px; }
        .cal-day-lbl { font-size: 9px; font-weight: 700; color: #8B4513; padding: 3px; text-transform: uppercase; }
        .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
        .cal-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-size: 10px; color: #888; background: #fafafa; }
        .cal-cell.has-bday { background: linear-gradient(135deg, #FFE8D6, #FFD4B3); color: #993C1D; font-weight: 700; }
        .cal-cell.today { background: #D85A30; color: white; font-weight: 700; border-radius: 50%; }

        /* ===== ALERT CARDS ===== */
        .alert-section { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
        @media (max-width: 600px) { .alert-section { grid-template-columns: 1fr; } }
        .alert-card { padding: 1rem; border-radius: 16px; }
        .alert-today { background: linear-gradient(135deg, #FFF5E1, #FAECE7); border-left: 5px solid #D85A30; }
        .alert-tmr   { background: linear-gradient(135deg, #FFFAEB, #FAEEDA); border-left: 5px solid #BA7517; }
        .alert-title { font-size: 13px; font-weight: 700; color: #2c1810; margin-bottom: 0.75rem; }
        .alert-empty { color: #ccc; font-style: italic; font-size: 13px; }
        .event-item  { background: rgba(255,255,255,0.85); padding: 9px 10px; border-radius: 11px; margin-bottom: 7px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(216,90,48,0.12); gap: 8px; }
        .event-info  { flex: 1; min-width: 0; }
        .event-name  { font-size: 13px; font-weight: 700; color: #2c1810; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .event-phone { font-size: 11px; color: #aaa; margin-top: 1px; }
        .wa-btn { display: inline-flex; align-items: center; gap: 4px; background: #25D366; color: white; border: none; border-radius: 20px; padding: 6px 11px; font-size: 11px; font-weight: 700; cursor: pointer; text-decoration: none; transition: 0.2s; flex-shrink: 0; }
        .wa-btn:hover { background: #1da853; }

        /* ===== ADD SECTION ===== */
        .add-section { background: white; padding: 1.2rem; border-radius: 16px; margin-bottom: 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .section-title { font-size: 15px; font-weight: 700; color: #2c1810; margin-bottom: 1rem; }
        .form-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 0.8rem; margin-bottom: 0.8rem; }
        @media (max-width: 600px) { .form-grid { grid-template-columns: 1fr; } }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 11px; font-weight: 700; color: #8B4513; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.4px; }
        .form-group input { padding: 10px 12px; border: 2px solid #eee; border-radius: 10px; font-size: 14px; width: 100%; transition: 0.2s; }
        .form-group input:focus { outline: none; border-color: #D85A30; background: #fff9f7; }
        .add-btn { background: linear-gradient(135deg, #D85A30, #993C1D); color: white; border: none; padding: 11px 22px; border-radius: 10px; font-size: 14px; font-weight: 700; cursor: pointer; transition: 0.3s; align-self: flex-start; }
        .add-btn:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(216,90,48,0.3); }
        @media (max-width: 600px) { .add-btn { width: 100%; align-self: stretch; text-align: center; } }

        /* ===== LIST SECTION ===== */
        .list-section { background: white; padding: 1.2rem; border-radius: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.06); }
        .filter-row { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
        .filter-btn { background: #f5f5f5; border: 1.5px solid #eee; padding: 7px 13px; border-radius: 20px; font-size: 12px; font-weight: 600; cursor: pointer; transition: 0.2s; color: #666; }
        .filter-btn.active { background: #D85A30; color: white; border-color: #D85A30; }
        .search-box { width: 100%; padding: 10px 14px; border: 2px solid #eee; border-radius: 10px; font-size: 14px; margin-bottom: 0.7rem; transition: 0.2s; }
        .search-box:focus { outline: none; border-color: #D85A30; background: #fff9f7; }
        .list-count { font-size: 12px; color: #bbb; margin-bottom: 0.5rem; }
        .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; border-radius: 10px; }
        .list-table { width: 100%; border-collapse: collapse; min-width: 400px; }
        .list-table thead { background: #fdf5f0; }
        .list-table th { padding: 10px 8px; text-align: left; font-size: 11px; font-weight: 700; color: #8B4513; border-bottom: 2px solid #f0e0d0; text-transform: uppercase; letter-spacing: 0.4px; white-space: nowrap; }
        .list-table td { padding: 11px 8px; border-bottom: 1px solid #f8f8f8; color: #333; font-size: 13px; }
        .data-row { cursor: pointer; transition: 0.15s; }
        .data-row:hover { background: #fff5f0; }
        .data-row:active { background: #feeee8; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 10px; font-weight: 700; white-space: nowrap; }
        .badge-today { background: #FAECE7; color: #993C1D; }
        .badge-tmr   { background: #FAEEDA; color: #854F0B; }
        .badge-soon  { background: #EAF3DE; color: #3B6D11; }
        .badge-far   { background: #F0F0F0; color: #888; }
        .empty-msg   { padding: 2.5rem; text-align: center; color: #ddd; font-size: 14px; }

        /* ===== LOADING ===== */
        .loading-overlay { position: fixed; inset: 0; background: rgba(255,249,230,0.95); z-index: 8888; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 14px; }
        .spinner { width: 44px; height: 44px; border: 4px solid #f0e0d0; border-top-color: #D85A30; border-radius: 50%; animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-overlay p { font-size: 14px; color: #8B4513; font-weight: 600; }

        /* ===== MODAL ===== */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 3000; align-items: flex-end; justify-content: center; }
        @media (min-width: 600px) { .modal-overlay { align-items: center; padding: 1rem; } }
        .modal-overlay.open { display: flex; animation: fadeOverlay 0.2s ease; }
        @keyframes fadeOverlay { from{opacity:0} to{opacity:1} }
        .modal-box { background: white; border-radius: 22px 22px 0 0; padding: 1.4rem 1.4rem 2rem; width: 100%; max-width: 520px; box-shadow: 0 -6px 40px rgba(0,0,0,0.12); max-height: 93vh; overflow-y: auto; animation: slideUp 0.3s cubic-bezier(.34,1.3,.64,1); }
        @media (min-width: 600px) { .modal-box { border-radius: 20px; animation: popIn 0.25s cubic-bezier(.34,1.3,.64,1); } }
        @keyframes slideUp { from{transform:translateY(80px);opacity:0} to{transform:translateY(0);opacity:1} }
        @keyframes popIn   { from{transform:scale(0.95);opacity:0} to{transform:scale(1);opacity:1} }
        .modal-handle { width: 38px; height: 4px; background: #e0e0e0; border-radius: 4px; margin: 0 auto 1rem; }
        @media (min-width: 600px) { .modal-handle { display: none; } }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1.2rem; }
        .modal-title { font-size: 18px; font-weight: 800; color: #2c1810; }
        .modal-x { background: #f5f5f5; border: none; width: 32px; height: 32px; border-radius: 50%; cursor: pointer; font-size: 15px; display: flex; align-items: center; justify-content: center; color: #888; transition: 0.2s; }
        .modal-x:hover { background: #eee; color: #333; }

        /* VIEW */
        .vfield { margin-bottom: 1rem; }
        .vfield label { font-size: 11px; font-weight: 700; color: #8B4513; display: block; margin-bottom: 3px; text-transform: uppercase; letter-spacing: 0.4px; }
        .vfield .val { padding: 9px 14px; background: #fafafa; border-radius: 10px; font-size: 14px; color: #222; }

        /* EDIT */
        #editMode { display: none; }
        #editMode .form-group { margin-bottom: 1rem; }
        #editMode .form-group label { font-size: 11px; font-weight: 700; color: #8B4513; display: block; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.4px; }
        #editMode .form-group input { width: 100%; padding: 11px 14px; border: 2px solid #eee; border-radius: 10px; font-size: 15px; transition: 0.2s; }
        #editMode .form-group input:focus { outline: none; border-color: #D85A30; background: #fff9f7; }

        /* MODAL ACTIONS */
        .mactions { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 1.4rem; }
        .mactions > * { flex: 1; min-width: 100px; padding: 11px 8px; border: none; border-radius: 10px; cursor: pointer; font-size: 13px; font-weight: 700; text-decoration: none; text-align: center; display: flex; align-items: center; justify-content: center; gap: 5px; transition: 0.2s; }
        .btn-close  { background: #f0f0f0; color: #666; }
        .btn-close:hover { background: #e5e5e5; }
        .btn-edit   { background: #e8f4fd; color: #1565C0; }
        .btn-edit:hover { background: #d0eafc; }
        .btn-save   { background: linear-gradient(135deg, #D85A30, #993C1D); color: white; }
        .btn-save:hover { box-shadow: 0 4px 14px rgba(216,90,48,0.35); }
        .btn-cedit  { background: #f0f0f0; color: #666; }
        .btn-wa     { background: #25D366; color: white; }
        .btn-wa:hover { background: #1da853; }
        .btn-del    { background: #fdecea; color: #c62828; }
        .btn-del:hover { background: #fbd2d0; }
        @media (max-width: 400px) { .mactions { flex-direction: column; } .mactions > * { min-width: unset; } }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 600px) {
            .app-header h1 { font-size: 16px; }
            .app-header { padding: 0.7rem 0.9rem; }
            .app-content { margin: 0.8rem auto; padding: 0 0.7rem 2rem; }
            .list-table th, .list-table td { padding: 9px 6px; font-size: 11px; }
            .badge { font-size: 9px; padding: 2px 7px; }
            .greeting { font-size: 14px; }
        }
        @media (min-width: 601px) and (max-width: 1024px) {
            .form-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>

<!-- LOADING -->
<div class="loading-overlay" id="loadingOverlay">
    <div class="spinner"></div>
    <p id="loadingText">Connecting to Cloud...</p>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- ===== LOGIN ===== -->
<div class="login-page" id="loginPage" style="display:none;">
    <div class="login-card">
        <h1>🎂 Legend Reminder</h1>
        <div class="sub">Bakery Birthday Tracker</div>
        <div class="login-error" id="loginError"></div>
        <form class="login-form" onsubmit="handleLogin(event)" autocomplete="on">
            <input type="text"     id="username" placeholder="Username" required autocomplete="username">
            <input type="password" id="password" placeholder="Password" required autocomplete="current-password">
            <button type="submit" id="loginBtn">Login</button>
        </form>
    </div>
</div>

<!-- ===== APP ===== -->
<div class="app-container" id="appContainer">

    <div class="sync-bar" id="syncBar">
        <div class="sync-dot"></div>
        <span id="syncText">Connecting to cloud...</span>
    </div>

    <div class="app-header">
        <h1>🎂 Legend Reminder</h1>
        <div class="header-right">
            <button class="sync-btn" onclick="manualSync()" title="Sync">🔄</button>
            <button class="logout-btn" onclick="handleLogout()">Logout</button>
        </div>
    </div>

    <div class="app-content">
        <div class="greeting" id="greeting"></div>

        <div class="month-calendar" id="calendarContainer"></div>

        <div class="alert-section">
            <div class="alert-card alert-today">
                <div class="alert-title">📅 Today's Birthdays</div>
                <div id="todayList"></div>
            </div>
            <div class="alert-card alert-tmr">
                <div class="alert-title">⏰ Tomorrow's Birthdays</div>
                <div id="tomorrowList"></div>
            </div>
        </div>

        <div class="add-section">
            <div class="section-title">➕ Add Birthday</div>
            <div class="form-grid">
                <div class="form-group">
                    <label>Customer Name</label>
                    <input type="text" id="inputName" placeholder="e.g. Priya">
                </div>
                <div class="form-group">
                    <label>Phone (WhatsApp)</label>
                    <input type="tel" id="inputPhone" placeholder="e.g. 9876543210">
                </div>
                <div class="form-group">
                    <label>Birthday</label>
                    <input type="date" id="inputDate">
                </div>
                <div class="form-group" style="justify-content:flex-end;">
                    <button class="add-btn" onclick="addBirthday()">+ Add Birthday</button>
                </div>
            </div>
        </div>

        <div class="list-section">
            <div class="section-title">📋 All Birthdays</div>
            <div class="filter-row">
                <button class="filter-btn active" onclick="setFilter('all',this)">All</button>
                <button class="filter-btn" onclick="setFilter('upcoming',this)">Next 30 Days</button>
                <button class="filter-btn" onclick="setFilter('month',this)">This Month</button>
            </div>
            <input type="text" class="search-box" id="searchBox" placeholder="🔍 Search by name..." oninput="renderList()">
            <div class="list-count" id="listCount"></div>
            <div class="table-wrap">
                <table class="list-table">
                    <thead>
                        <tr>
                            <th>Name</th>
                            <th>Phone</th>
                            <th>Birthday</th>
                            <th>Days Left</th>
                            <th>WhatsApp</th>
                        </tr>
                    </thead>
                    <tbody id="listBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- ===== MODAL ===== -->
<div class="modal-overlay" id="dataModal" onclick="outsideClick(event)">
    <div class="modal-box" id="modalBox">
        <div class="modal-handle"></div>
        <div class="modal-header">
            <div class="modal-title" id="modalTitle">Birthday Details</div>
            <button class="modal-x" onclick="closeModal()">✕</button>
        </div>

        <!-- VIEW -->
        <div id="viewMode">
            <div class="vfield"><label>Name</label><div class="val" id="vName"></div></div>
            <div class="vfield"><label>Phone</label><div class="val" id="vPhone"></div></div>
            <div class="vfield"><label>Birthday</label><div class="val" id="vBirthday"></div></div>
            <div class="vfield"><label>Days Until Birthday</label><div class="val" id="vDays"></div></div>
            <div class="mactions">
                <button class="btn-close" onclick="closeModal()">Close</button>
                <button class="btn-edit"  onclick="toEdit()">✏️ Edit</button>
                <a      class="btn-wa"    id="viewWA" href="#" target="_blank">WhatsApp</a>
                <button class="btn-del"   onclick="deleteEntry()">🗑 Delete</button>
            </div>
        </div>

        <!-- EDIT -->
        <div id="editMode">
            <div class="form-group"><label>Customer Name</label><input type="text" id="eName" placeholder="Name"></div>
            <div class="form-group"><label>Phone (WhatsApp)</label><input type="tel"  id="ePhone" placeholder="Phone"></div>
            <div class="form-group"><label>Birthday</label><input type="date" id="eDate"></div>
            <div class="mactions">
                <button class="btn-cedit" onclick="toView()">Cancel</button>
                <button class="btn-save"  onclick="saveEdit()">💾 Save Changes</button>
            </div>
        </div>
    </div>
</div>

<script>
/* ============================
   FIREBASE CONFIG
   — Replace these values with
     your own Firebase project —
   ============================ */
const FB_CONFIG = {
    apiKey: "AIzaSyC4vBxXXXXXXXXXXXXXXXXXXXXXXXXXXX",
    databaseURL: "https://legend-reminder-default-rtdb.asia-southeast1.firebasedatabase.app"
};

const VALID_USER = '9751488503';
const VALID_PASS = 'Neevarp5@3';
const FB_PATH    = 'legend_cakes_birthdays';

let entries        = [];
let currentFilter  = 'all';
let activeId       = null;
let db             = null;
let fbRef          = null;
let fbConnected    = false;
let fbTimeout      = null;

/* ============ STARTUP ============ */
window.addEventListener('load', startup);

function startup() {
    setLoading(true, 'Connecting to Cloud...');
    const loggedIn = localStorage.getItem('lr_logged');

    // Try Firebase
    try {
        firebase.initializeApp(FB_CONFIG);
        db    = firebase.database();
        fbRef = db.ref(FB_PATH);

        // Connectivity detection
        db.ref('.info/connected').on('value', snap => {
            if (snap.val() === true) {
                fbConnected = true;
                clearTimeout(fbTimeout);
                setSyncBar('synced', '✓ Synced — data shared across all devices');
            } else {
                fbConnected = false;
                setSyncBar('offline', '⚠ Offline — showing locally saved data');
            }
        });

        // Real-time listener
        fbRef.on('value', snap => {
            clearTimeout(fbTimeout);
            const val = snap.val();
            entries = val ? Object.values(val) : [];
            localStorage.setItem('lr_backup', JSON.stringify(entries));
            setLoading(false);
            if (loggedIn) { showApp(); renderUI(); }
            else { showLogin(); }
        }, () => fallbackToLocal(loggedIn));

        // Timeout after 5s
        fbTimeout = setTimeout(() => {
            if (!fbConnected) fallbackToLocal(loggedIn);
        }, 5000);

    } catch(e) {
        fallbackToLocal(loggedIn);
    }
}

function fallbackToLocal(loggedIn) {
    db = null; fbRef = null; fbConnected = false;
    const bk = localStorage.getItem('lr_backup') || localStorage.getItem('entries_backup') || localStorage.getItem('entries');
    entries = bk ? JSON.parse(bk) : [];
    setSyncBar('offline', '⚠ Offline — data saved on this device only');
    setLoading(false);
    if (loggedIn) { showApp(); renderUI(); }
    else { showLogin(); }
}

function setLoading(show, msg) {
    const el = document.getElementById('loadingOverlay');
    el.style.display = show ? 'flex' : 'none';
    if (msg) document.getElementById('loadingText').textContent = msg;
}

function showLogin() { document.getElementById('loginPage').style.display = 'flex'; document.getElementById('appContainer').style.display = 'none'; }
function showApp()   { document.getElementById('loginPage').style.display = 'none'; document.getElementById('appContainer').style.display = 'block'; }

function setSyncBar(state, text) {
    const bar = document.getElementById('syncBar');
    bar.className = 'sync-bar' + (state ? ' ' + state : '');
    document.getElementById('syncText').textContent = text;
}

/* ============ AUTH ============ */
function handleLogin(e) {
    e.preventDefault();
    const u = document.getElementById('username').value.trim();
    const p = document.getElementById('password').value.trim();
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('loginError');

    if (u === VALID_USER && p === VALID_PASS) {
        btn.textContent = 'Logging in...';
        btn.disabled = true;
        localStorage.setItem('lr_logged', '1');
        showApp();
        renderUI();
    } else {
        err.textContent = u !== VALID_USER ? 'Invalid username.' : 'Incorrect password.';
        err.style.display = 'block';
    }
}

function handleLogout() {
    if (!confirm('Logout from Legend Reminder?')) return;
    if (fbRef) fbRef.off();
    localStorage.removeItem('lr_logged');
    document.getElementById('username').value = '';
    document.getElementById('password').value = '';
    document.getElementById('loginBtn').textContent = 'Login';
    document.getElementById('loginBtn').disabled = false;
    document.getElementById('loginError').style.display = 'none';
    showLogin();
}

function manualSync() {
    if (!fbRef) { showToast('Offline — cannot sync', 'error'); return; }
    setSyncBar('', 'Syncing...');
    fbRef.once('value', snap => {
        const val = snap.val();
        entries = val ? Object.values(val) : [];
        localStorage.setItem('lr_backup', JSON.stringify(entries));
        setSyncBar('synced', '✓ Synced across all devices');
        renderUI();
        showToast('Sync complete!', 'success');
    }, () => showToast('Sync failed', 'error'));
}

/* ============ HELPERS ============ */
const pad   = n => String(n).padStart(2, '0');

function getTodayMMDD() {
    const d = new Date();
    return pad(d.getMonth() + 1) + pad(d.getDate());
}

function toMMDD(dateStr) {
    if (!dateStr) return '';
    const p = dateStr.split('-');
    return p[1] + p[2];
}

function mmddToDate(mmdd) {
    const y = new Date().getFullYear();
    return `${y}-${mmdd.substring(0,2)}-${mmdd.substring(2,4)}`;
}

function formatDate(mmdd) {
    if (!mmdd || mmdd.length !== 4) return '—';
    const ms = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
    return `${mmdd.substring(2)} ${ms[parseInt(mmdd.substring(0,2)) - 1]}`;
}

function daysUntil(mmdd) {
    const t = new Date(); const y = t.getFullYear();
    let bd = new Date(y, parseInt(mmdd.substring(0,2))-1, parseInt(mmdd.substring(2,4)));
    const today = new Date(t.getFullYear(), t.getMonth(), t.getDate());
    if (bd < today) bd.setFullYear(y + 1);
    return Math.round((bd - today) / 86400000);
}

function waLink(name, phone) {
    const c   = phone.replace(/\D/g, '');
    const msg = `Happy Birthday ${name}! 🎂🎉 Wishing you a wonderful day! - Legend Cakes`;
    return `https://wa.me/${c}?text=${encodeURIComponent(msg)}`;
}

function badgeOf(days) {
    if (days === 0)  return `<span class="badge badge-today">🎉 Today!</span>`;
    if (days === 1)  return `<span class="badge badge-tmr">⏰ Tomorrow</span>`;
    if (days <= 30)  return `<span class="badge badge-soon">In ${days}d</span>`;
    return               `<span class="badge badge-far">${days}d</span>`;
}

/* ============ SAVE ============ */
function persist() {
    localStorage.setItem('lr_backup', JSON.stringify(entries));
    localStorage.setItem('entries',   JSON.stringify(entries));
    if (fbRef && fbConnected) {
        const obj = {};
        entries.forEach(e => { obj['id_' + e.id] = e; });
        fbRef.set(obj)
            .then(()  => setSyncBar('synced', '✓ Saved to cloud'))
            .catch(()  => setSyncBar('offline', '⚠ Saved locally (cloud error)'));
    } else {
        setSyncBar('offline', '⚠ Saved locally — will sync when online');
    }
}

/* ============ RENDER ============ */
function renderUI() {
    const h = new Date().getHours();
    document.getElementById('greeting').textContent =
        h < 12 ? '🌅 Good Morning!' : h < 17 ? '☀️ Good Afternoon!' : '🌙 Good Evening!';
    renderAlerts();
    renderCalendar();
    renderList();
}

function renderAlerts() {
    const today = getTodayMMDD();
    const tmrD  = new Date(); tmrD.setDate(tmrD.getDate() + 1);
    const tmr   = pad(tmrD.getMonth() + 1) + pad(tmrD.getDate());

    ['today','tmr'].forEach(k => {
        const mmdd = k === 'today' ? today : tmr;
        const list = entries.filter(e => e.mmdd === mmdd);
        document.getElementById(k === 'today' ? 'todayList' : 'tomorrowList').innerHTML =
            list.length === 0
            ? '<div class="alert-empty">No birthdays ' + (k==='today'?'today':'tomorrow') + ' 🙂</div>'
            : list.map(e => `<div class="event-item">
                <div class="event-info">
                    <div class="event-name">${e.name}</div>
                    <div class="event-phone">${e.phone||'No phone'}</div>
                </div>
                ${e.phone?`<a href="${waLink(e.name,e.phone)}" target="_blank" class="wa-btn">🟢 Wish</a>`:''}
              </div>`).join('');
    });
}

function renderCalendar() {
    const now = new Date(); const y = now.getFullYear(); const m = now.getMonth();
    const first = new Date(y, m, 1).getDay();
    const days  = new Date(y, m + 1, 0).getDate();
    const todayD = now.getDate();
    const cm = pad(m + 1);
    const bdSet = new Set(entries.filter(e => e.mmdd && e.mmdd.substring(0,2) === cm).map(e => parseInt(e.mmdd.substring(2))));
    const mNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    let h = `<div class="cal-title">${mNames[m]} ${y}</div>
    <div class="cal-grid-header">${['Su','Mo','Tu','We','Th','Fr','Sa'].map(d=>`<div class="cal-day-lbl">${d}</div>`).join('')}</div>
    <div class="cal-grid">`;
    for (let i = 0; i < first; i++) h += '<div></div>';
    for (let d = 1; d <= days; d++) {
        let cls = 'cal-cell';
        if (d === todayD) cls += ' today';
        else if (bdSet.has(d)) cls += ' has-bday';
        h += `<div class="${cls}">${d}</div>`;
    }
    document.getElementById('calendarContainer').innerHTML = h + '</div>';
}

function renderList() {
    const q = (document.getElementById('searchBox').value||'').toLowerCase();
    let f = entries.filter(e => e.name && e.name.toLowerCase().includes(q));

    if (currentFilter === 'upcoming') f = f.filter(e => { const d=daysUntil(e.mmdd); return d>=0&&d<=30; });
    if (currentFilter === 'month')    f = f.filter(e => e.mmdd && e.mmdd.substring(0,2) === getTodayMMDD().substring(0,2));

    f.sort((a,b) => daysUntil(a.mmdd) - daysUntil(b.mmdd));
    document.getElementById('listCount').textContent = `${f.length} record${f.length!==1?'s':''}`;

    const tbody = document.getElementById('listBody');
    if (!f.length) { tbody.innerHTML = `<tr><td colspan="5" class="empty-msg">🎂 No birthdays found</td></tr>`; return; }

    tbody.innerHTML = f.map(e => {
        const d = daysUntil(e.mmdd);
        return `<tr class="data-row" onclick="openModal(${e.id})">
            <td><strong>${e.name}</strong></td>
            <td style="color:#888;">${e.phone||'—'}</td>
            <td>${formatDate(e.mmdd)}</td>
            <td>${badgeOf(d)}</td>
            <td>${e.phone?`<a href="${waLink(e.name,e.phone)}" target="_blank" class="wa-btn" onclick="event.stopPropagation()">Wish</a>`:'—'}</td>
        </tr>`;
    }).join('');
}

/* ============ ADD ============ */
function addBirthday() {
    const name = document.getElementById('inputName').value.trim();
    const phone= document.getElementById('inputPhone').value.trim();
    const date = document.getElementById('inputDate').value;

    if (!name)  { showToast('Please enter customer name', 'error'); return; }
    if (!date)  { showToast('Please select birthday date', 'error'); return; }
    if (phone && entries.some(e => e.phone === phone)) { showToast('Phone number already exists!', 'error'); return; }

    entries.push({ id: Date.now(), name, phone, mmdd: toMMDD(date) });
    entries.sort((a,b) => daysUntil(a.mmdd) - daysUntil(b.mmdd));
    persist();

    document.getElementById('inputName').value  = '';
    document.getElementById('inputPhone').value = '';
    document.getElementById('inputDate').value  = '';
    renderUI();
    showToast(`🎂 ${name} added!`, 'success');
}

function setFilter(f, btn) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    renderList();
}

/* ============ MODAL ============ */
function openModal(id) {
    const e = entries.find(x => x.id === id);
    if (!e) return;
    activeId = id;

    const d = daysUntil(e.mmdd);
    document.getElementById('vName').textContent    = e.name;
    document.getElementById('vPhone').textContent   = e.phone || 'Not provided';
    document.getElementById('vBirthday').textContent= formatDate(e.mmdd);
    document.getElementById('vDays').innerHTML      = badgeOf(d);

    const wa = document.getElementById('viewWA');
    if (e.phone) { wa.href = waLink(e.name, e.phone); wa.style.display = 'flex'; }
    else           wa.style.display = 'none';

    toView();
    document.getElementById('dataModal').classList.add('open');
    document.body.style.overflow = 'hidden';
}

function toView() {
    document.getElementById('modalTitle').textContent = 'Birthday Details';
    document.getElementById('viewMode').style.display = 'block';
    document.getElementById('editMode').style.display = 'none';
}

function toEdit() {
    const e = entries.find(x => x.id === activeId);
    if (!e) return;
    document.getElementById('eName').value  = e.name;
    document.getElementById('ePhone').value = e.phone || '';
    document.getElementById('eDate').value  = mmddToDate(e.mmdd);
    document.getElementById('modalTitle').textContent = '✏️ Edit Birthday';
    document.getElementById('viewMode').style.display = 'none';
    document.getElementById('editMode').style.display = 'block';
    document.getElementById('eName').focus();
}

function saveEdit() {
    const name  = document.getElementById('eName').value.trim();
    const phone = document.getElementById('ePhone').value.trim();
    const date  = document.getElementById('eDate').value;

    if (!name) { showToast('Name cannot be empty', 'error'); return; }
    if (!date) { showToast('Please select a date', 'error'); return; }
    if (phone && entries.some(e => e.phone === phone && e.id !== activeId)) {
        showToast('Phone number already exists!', 'error'); return;
    }

    const idx = entries.findIndex(e => e.id === activeId);
    if (idx !== -1) {
        entries[idx] = { ...entries[idx], name, phone, mmdd: toMMDD(date) };
        entries.sort((a,b) => daysUntil(a.mmdd) - daysUntil(b.mmdd));
        persist();
        renderUI();
        closeModal();
        showToast(`✅ ${name} updated!`, 'success');
    }
}

function deleteEntry() {
    const e = entries.find(x => x.id === activeId);
    if (!e || !confirm(`Delete birthday for ${e.name}?`)) return;
    entries = entries.filter(x => x.id !== activeId);
    persist();
    renderUI();
    closeModal();
    showToast(`🗑 ${e.name} deleted`);
}

function closeModal() {
    document.getElementById('dataModal').classList.remove('open');
    document.body.style.overflow = '';
    activeId = null;
}

function outsideClick(ev) {
    if (ev.target === document.getElementById('dataModal')) closeModal();
}

/* ============ TOAST ============ */
function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className   = 'toast' + (type ? ' ' + type : '');
    t.classList.add('show');
    clearTimeout(t._t);
    t._t = setTimeout(() => t.classList.remove('show'), 2800);
}

/* ============ ONLINE / OFFLINE ============ */
window.addEventListener('online',  () => { manualSync(); });
window.addEventListener('offline', () => setSyncBar('offline', '⚠ Offline — data saved locally'));
</script>
